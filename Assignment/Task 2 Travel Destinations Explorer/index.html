<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Explorer</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #eef2f7;
        font-family: "Segoe UI", sans-serif;
      }

      .main-box {
        max-width: 950px;
        margin: 50px auto;
        background: #fff;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }

      h2 {
        text-align: center;
        margin-bottom: 25px;
        font-weight: 600;
        color: #333;
      }

      table thead {
        background: #0d6efd;
        color: white;
      }

      table tbody tr {
        transition: 0.2s ease-in-out;
      }

      table tbody tr:hover {
        background-color: #f8f9fa;
        transform: translateY(-2px);
      }

      .badge-season {
        background: #198754;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 12px;
      }

      .rating {
        color: #ff9800;
        font-weight: 500;
      }
    </style>
  </head>

  <body>
    <div class="main-box">
      <h2>🌍 Travel Destinations Explorer</h2>

      <div class="table-responsive">
        <table class="table table-hover align-middle text-center">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Country</th>
              <th>Best Season</th>
              <th>Rating</th>
            </tr>
          </thead>

          <tbody id="travel_data"></tbody>
        </table>
      </div>
    </div>

    <script>
      var user_data = document.getElementById("travel_data");

      fetch("app.json")
        .then((res) => res.json())
        .then((data) => {
          data.forEach((item) => {
            user_data.innerHTML += `
            <tr>
              <td>${item.id}</td>
              <td><strong>${item.name}</strong></td>
              <td>${item.country}</td>
              <td><span class="badge-season text-white">${item.best_season}</span></td>
              <td class="rating">⭐ ${item.rating}</td>
            </tr>
          `;
          });
        });
    </script>
  </body>
</html>
