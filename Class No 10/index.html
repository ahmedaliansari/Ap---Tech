<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Java Script Functions</h1>
    <h3>Call Back With Nested Functions & setTimeout</h3>

    <input type="text" id="input" placeholder="Enter Your Name Here" />
    <button onclick="get_data(msg)">Click</button>

    <h3 id="std_data"></h3>

    <script>
      function get_data(data) {
        var name = document.getElementById("input").value;

        if (name === "") {
          alert("Please Enter Your Name Then Hit Click button");
        } else {
          reset();

          setTimeout(() => {
            data(name);
          }, 3000);
        }
      }

      function msg(i) {
        document.getElementById("std_data").textContent =
          "Wellcome, " + i + " Have a good coding day...";
      }

      function reset() {
        document.getElementById("input").value = null;
      }
    </script>
  </body>
</html>
