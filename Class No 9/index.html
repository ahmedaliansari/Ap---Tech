<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Functions</h1>
    <h3>Call Back With Nested Functions</h3>

    <input type="text" id="name" placeholder="Enter Your Name" />
    <button onclick="send_data(name)">Submit</button>

    <br />
    <br />

    <span id="show_msg"></span>

    <script>
      function send_data(name) {
        var name = document.getElementById("name").value;

        if (name === "") {
          alert("Please Enter Your Name");
        } else {
          show(name);
          document.getElementById("name").value = null;
        }
      }

      function show(msg) {
        document.getElementById("show_msg").textContent = "Wellcome, " + msg;
      }
    </script>
  </body>
</html>
